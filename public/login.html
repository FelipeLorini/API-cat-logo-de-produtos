<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(90deg, #2979ff, #0f3460);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 15px;
        }
        input::placeholder { color: #aaa; }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #2979ff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); background: #1c6df0; }
        #msg { margin-top: 20px; font-size: 14px; text-align: center; }
        #msg a { color: #2979ff; text-decoration: none; }
        .voltar { display: block; margin-top: 20px; color: #aaa; text-decoration: none; font-size: 14px; text-align: center; }
        .voltar:hover { color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Login</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="login()">Entrar</button>
        <p id="msg"></p>
        <a href="/" class="voltar">Voltar</a>
    </div>
    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            if (!email || !senha) { document.getElementById('msg').innerHTML = 'Preencha todos os campos!'; return; }
            try {
                const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, senha }) });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    document.getElementById('msg').innerHTML = 'Login feito! <a href="/produtos.html">Ir para produtos</a>';
                } else {
                    document.getElementById('msg').innerHTML = data.mensagem || 'Email ou senha incorretos!';
                }
            } catch (err) { document.getElementById('msg').innerHTML = 'Erro de conexão'; }
        }
    </script>
</body>
</html>
